name: Deploy Backend

on:
  push:
    branches:
      - develop

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Docker Login
      uses: docker/login-action@v2

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t kat018/backend-evaluacion .

    - name: Push Image
      run: |
        docker push kat018/backend-evaluacion